$kind: http-request
name: CT009 - Atualizar Reserva Existente com Token Válido
description: |-
  CT009 - Atualizar Reserva Existente com Token Válido

  Objetivo:  
  Validar a atualização de uma reserva existente utilizando autenticação válida.

  Pré-condições:

  - Executar CT001 para gerar um token válido.
      
  - Executar CT004 para criar uma reserva e armazenar o bookingID.
      

  Resultado Esperado:

  - Retornar HTTP 200.
      
  - Atualizar os dados da reserva.
      
  - Retornar os dados atualizados no corpo da resposta.
url: "{{baseURL}}/booking/{{bookingID}}"
method: GET
headers:
  Accept: application/json
  Cookie: token={{token}}
body:
  type: json
  content: "{\r

    \  \"firstname\": \"Victor\",\r

    \  \"lastname\": \"Hugo Atualizado\",\r

    \  \"totalprice\": 450,\r

    \  \"depositpaid\": false,\r

    \  \"bookingdates\": {\r

    \    \"checkin\": \"2026-08-01\",\r

    \    \"checkout\": \"2026-08-05\"\r

    \  },\r

    \  \"additionalneeds\": \"Dinner\"\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code deve ser 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Lastname deve estar atualizado\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.lastname).to.eql(\"Hugo Atualizado\");\r

      });\r

      \r

      pm.test(\"Totalprice deve estar atualizado\", function () {\r

      \    const jsonData = pm.response.json();\r

      \    pm.expect(jsonData.totalprice).to.eql(450);\r

      });"
    language: text/javascript
settings:
  disabledSystemHeaders:
    - accept
order: 3866580313106334

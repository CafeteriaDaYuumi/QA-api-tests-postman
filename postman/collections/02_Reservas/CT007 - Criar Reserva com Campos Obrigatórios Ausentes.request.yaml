$kind: http-request
name: CT007 - Criar Reserva com Campos Obrigatórios Ausentes
description: |-
  ### CT007 - Criar Reserva com Campos Obrigatórios Ausentes

  **Objetivo:**  
  Validar o comportamento da API ao receber uma requisição de criação de reserva com campos obrigatórios ausentes.

  **Pré-condições:**

  - API disponível para acesso.
      
  - Endpoint de criação de reservas operacional.
      
  - Possuir uma massa de dados incompleta, omitindo um ou mais campos obrigatórios da reserva.
      

  **Método:**  
  POST

  **Endpoint:**  
  /booking

  **Passos:**

  1. Enviar uma requisição POST para `/booking`.
      
  2. Informar apenas parte dos dados necessários para criação da reserva.
      
  3. Omitir um ou mais campos obrigatórios.
      
  4. Executar a requisição.
      

  **Resultado Esperado:**

  - A API deve validar os dados recebidos.
      
  - A API deve retornar uma resposta compatível com o tratamento de erro definido para o cenário.
      
  - Não deve criar uma reserva com informações incompletas.
      

  **Critério de Aprovação:**

  A API deve impedir a criação da reserva ou tratar adequadamente a ausência de informações obrigatórias, retornando uma resposta coerente com a regra de validação adotada.

  **Observação:**

  - Caso a API aceite a criação da reserva mesmo com campos obrigatórios ausentes, o comportamento deverá ser registrado para análise e possível documentação como defeito.
      
  - Registrar o código HTTP retornado e a mensagem apresentada pela API durante a execução do teste.
      
  - Registrar quais campos foram omitidos na massa de dados utilizada.
url: "{{baseURL}}/booking"
method: POST
body:
  type: json
  content: "{\r\n  \"firstname\": \"Victor\"\r\n}"
scripts:
  - type: afterResponse
    code: "// Registra o código retornado pela API\r

      console.log(\"Status retornado:\", pm.response.code);\r

      \r

      // Valida que a API respondeu\r

      pm.test(\"A API deve retornar uma resposta\", function () {\r

      \    pm.expect(pm.response.code).to.be.a(\"number\");\r

      });\r

      \r

      // Exibe o corpo retornado para análise\r

      console.log(\"Resposta:\", pm.response.text());\r

      \r

      // Caso a API aceite a reserva, registra possível defeito\r

      if (pm.response.code === 200) {\r

      \r

      \    const jsonData = pm.response.json();\r

      \r

      \    pm.test(\"Possível defeito: reserva criada com dados incompletos\", function () {\r

      \        pm.expect(jsonData).to.have.property(\"bookingid\");\r

      \    });\r

      \r

      } else {\r

      \r

      \    pm.test(\"API rejeitou a requisição\", function () {\r

      \        pm.expect(pm.response.code).to.be.oneOf([400, 500]);\r

      \    });\r

      \r

      }"
    language: text/javascript
order: 386067290142527

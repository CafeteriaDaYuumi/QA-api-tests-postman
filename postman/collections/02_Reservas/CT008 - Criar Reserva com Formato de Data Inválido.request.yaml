$kind: http-request
name: CT008 - Criar Reserva com Formato de Data Inválido
description: |-
  ### CT008 - Criar Reserva com Formato de Data Inválido

  **Objetivo:**  
  Validar o comportamento da API ao receber uma requisição de criação de reserva contendo uma data em formato inválido.

  **Pré-condições:**

  - API disponível para acesso.
      
  - Endpoint de criação de reservas operacional.
      
  - Possuir uma massa de dados contendo data inválida no campo `checkin` ou `checkout`.
      

  **Método:**  
  POST

  **Endpoint:**  
  /booking

  **Passos:**

  1. Enviar uma requisição POST para `/booking`.
      
  2. Informar os dados da reserva.
      
  3. Preencher um dos campos de data com um valor inválido.
      
  4. Executar a requisição.
      

  **Resultado Esperado:**

  - A API deve validar o formato da data informada.
      
  - A API deve retornar uma resposta compatível com o tratamento de erro definido para o cenário.
      
  - Não deve criar uma reserva com dados inválidos.
      

  **Critério de Aprovação:**

  A API deve impedir a criação da reserva ou tratar adequadamente a entrada inválida, retornando uma resposta coerente com a regra de validação adotada.

  **Observação:**

  - Caso a API aceite a reserva mesmo contendo uma data inválida, o comportamento deverá ser registrado para análise e possível documentação como defeito.
      
  - Registrar o código HTTP retornado e a mensagem apresentada pela API durante a execução do teste.
url: "{{baseURL}}/booking"
method: POST
body:
  type: json
  content: "{\r

    \  \"firstname\": \"Victor\",\r

    \  \"lastname\": \"Hugo\",\r

    \  \"totalprice\": 350,\r

    \  \"depositpaid\": true,\r

    \  \"bookingdates\": {\r

    \    \"checkin\": \"data-invalida\",\r

    \    \"checkout\": \"2026-07-05\"\r

    \  },\r

    \  \"additionalneeds\": \"Breakfast\"\r

    }"
scripts:
  - type: afterResponse
    code: "// Exibe o status retornado pela API\r

      console.log(\"Status retornado:\", pm.response.code);\r

      \r

      // Exibe a resposta completa para análise\r

      console.log(\"Resposta:\", pm.response.text());\r

      \r

      // Valida que a API respondeu\r

      pm.test(\"A API deve retornar uma resposta\", function () {\r

      \    pm.expect(pm.response.code).to.be.a(\"number\");\r

      });\r

      \r

      // Caso a API aceite a data inválida\r

      if (pm.response.code === 200) {\r

      \r

      \    const jsonData = pm.response.json();\r

      \r

      \    pm.test(\"Possível defeito: reserva criada com data inválida\", function () {\r

      \        pm.expect(jsonData).to.have.property(\"bookingid\");\r

      \    });\r

      \r

      }\r

      else {\r

      \r

      \    pm.test(\"API rejeitou a data inválida\", function () {\r

      \        pm.expect(pm.response.code).to.be.oneOf([400, 422, 500]);\r

      \    });\r

      \r

      }"
    language: text/javascript
order: 2572495171356767

$kind: http-request
name: CT012 - Excluir Reserva Existente com Token Válido
description: |-
  ### CT012 - Excluir Reserva Existente com Token Válido

  **Objetivo:**  
  Validar a exclusão de uma reserva existente utilizando autenticação válida.

  **Pré-condições:**

  - Executar CT001 para gerar um token válido.
      
  - Executar CT004 para criar uma reserva válida.
      
  - Possuir um bookingID válido armazenado no ambiente.
      

  **Método:**  
  DELETE

  **Endpoint:**  
  /booking/{id}

  **Headers:**

  ``` text
  Cookie: token={{token}}

   ```

  **Passos:**

  1. Executar o CT001 para gerar um token válido.
      
  2. Executar o CT004 para criar uma reserva válida.
      
  3. Armazenar o bookingID retornado.
      
  4. Enviar requisição DELETE para `/booking/{id}` utilizando o bookingID criado.
      
  5. Informar o token de autenticação no header Cookie.
      
  6. Executar a requisição.
      

  **Resultado Esperado:**

  - Retornar HTTP 201.
      
  - Confirmar a exclusão da reserva.
      
  - Não apresentar erros de autenticação.
      

  **Critério de Aprovação:**

  A API deve excluir a reserva informada e retornar HTTP 201 (Created), indicando que a operação foi concluída com sucesso.
url: "{{baseURL}}/booking/{{bookingID}}"
method: DELETE
headers:
  Cookie: token={{token}}
scripts:
  - type: afterResponse
    code: "// Valida se a exclusão foi realizada com sucesso\r

      pm.test(\"Status code deve ser 201\", function () {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      // Valida a mensagem retornada pela API\r

      pm.test(\"Resposta deve indicar Created\", function () {\r

      \    pm.expect(pm.response.text()).to.include(\"Created\");\r

      });\r

      \r

      // Exibe informações para diagnóstico\r

      console.log(\"Booking ID excluído:\", pm.environment.get(\"bookingID\"));\r

      console.log(\"Resposta:\", pm.response.text());"
    language: text/javascript
order: 4383647476300679

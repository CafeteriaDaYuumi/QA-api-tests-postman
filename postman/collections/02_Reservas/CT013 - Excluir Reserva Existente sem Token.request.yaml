$kind: http-request
name: CT013 - Excluir Reserva Existente sem Token
description: |-
  ### CT013 - Excluir Reserva Existente sem Token

  **Objetivo:**  
  Validar que a API não permite a exclusão de uma reserva quando a requisição é enviada sem autenticação válida.

  **Pré-condições:**

  - Executar CT004 para criar uma reserva válida.
      
  - Verificar se a variável bookingID foi preenchida corretamente.
      
  - Remover ou não informar o token de autenticação na requisição.
      
  - A reserva utilizada para o teste deve existir.
      

  **Método:**  
  DELETE

  **Endpoint:**  
  /booking/{id}

  **Passos:**

  1. Executar CT004 para criar uma reserva válida.
      
  2. Armazenar o bookingID retornado.
      
  3. Enviar requisição DELETE para `/booking/{id}`.
      
  4. Não informar token de autenticação.
      
  5. Executar a requisição.
      

  **Resultado Esperado:**

  - Retornar HTTP 403.
      
  - Não permitir a exclusão da reserva.
      
  - Manter a reserva cadastrada no sistema.
      

  **Critério de Aprovação:**

  A API deve bloquear a operação de exclusão quando não houver autenticação válida, retornando HTTP 403.
url: "{{baseURL}}/booking/{{bookingID}}"
method: DELETE
scripts:
  - type: afterResponse
    code: "// Valida se a API bloqueou a exclusão sem autenticação\r

      pm.test(\"Status code deve ser 403\", function () {\r

      \    pm.response.to.have.status(403);\r

      });\r

      \r

      // Exibe informações para análise\r

      console.log(\"Status retornado:\", pm.response.code);\r

      console.log(\"Resposta:\", pm.response.text());\r

      console.log(\"Booking ID utilizado:\", pm.environment.get(\"bookingID\"));\r

      \r

      // Valida que a resposta não está vazia\r

      pm.test(\"Resposta não deve estar vazia\", function () {\r

      \    pm.expect(pm.response.text().length).to.be.above(0);\r

      });"
    language: text/javascript
order: 4484432018369123

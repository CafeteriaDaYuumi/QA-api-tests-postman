$kind: http-request
name: CT018 - Validar Tratamento de Erro para Requisições Inválidas
description: |-
  ### CT018 - Validar Tratamento de Erro para Requisições Inválidas

  **Objetivo:**

  Validar se a API trata corretamente requisições inválidas, retornando códigos HTTP e mensagens de erro compatíveis com o cenário executado.

  **Pré-condições:**

  - Possuir acesso à API Restful Booker.
      
  - Executar cenários com dados inválidos, inexistentes ou incompletos.
      
  - Executar requisições sem autenticação quando aplicável.
      
  - Garantir que os cenários negativos estejam configurados corretamente.
      

  **Escopo:**

  - CT002 - Credenciais inválidas.
      
  - CT006 - Consulta de reserva inexistente.
      
  - CT007 - Campos obrigatórios ausentes.
      
  - CT008 - Formato de data inválido.
      
  - CT010 - Atualização sem token.
      
  - CT011 - Atualização de reserva inexistente.
      
  - CT013 - Exclusão sem token.
      
  - CT014 - Exclusão de reserva inexistente.
      

  **Resultado Esperado:**

  - A API deve retornar códigos HTTP compatíveis com o erro encontrado.
      
  - As mensagens de erro devem ser coerentes com o cenário executado.
      
  - Nenhuma operação inválida deve ser processada com sucesso.
      

  **Critério de Aprovação:**

  Todos os cenários negativos devem retornar respostas de erro adequadas e impedir a execução indevida das operações.
url: "{{baseURL}}/booking/999999999"
method: GET
scripts:
  - type: afterResponse
    code: "// Valida se a API retornou erro\r

      pm.test(\"Status code deve indicar erro\", function () {\r

      \    pm.expect(pm.response.code).to.not.be.oneOf([200, 201]);\r

      });\r

      \r

      // Exibe informações para análise\r

      console.log(\"Status retornado:\", pm.response.code);\r

      console.log(\"Resposta:\", pm.response.text());"
    language: text/javascript
order: 4496886548465603

$kind: http-request
name: CT016 - Validar Contrato JSON da Consulta de Reserva por ID
description: |-
  ### CT016 - Validar Contrato JSON da Consulta de Reserva por ID

  **Objetivo:**  
  Validar se a resposta da consulta de uma reserva segue o contrato JSON esperado pela API.

  **Pré-condições:**

  - Executar CT004 - Criar Reserva com Dados Válidos.
      
  - Verificar se a variável bookingID foi preenchida corretamente.
      
  - Garantir que a reserva exista para consulta.
      

  **Método:**  
  GET

  **Endpoint:**  
  /booking/{id}

  **Passos:**

  1. Executar CT004 para criar uma reserva válida.
      
  2. Obter o bookingID gerado.
      
  3. Enviar requisição GET para `/booking/{id}`.
      
  4. Executar a validação do contrato JSON.
      

  **Resultado Esperado:**

  - A resposta deve estar em formato JSON.
      
  - Deve conter os campos firstname, lastname, totalprice, depositpaid, bookingdates e additionalneeds.
      
  - O objeto bookingdates deve conter os campos checkin e checkout.
      

  **Critério de Aprovação:**

  O contrato JSON da resposta deve conter todos os campos obrigatórios esperados para a consulta de uma reserva.
url: "{{baseURL}}/booking/{{bookingID}}"
method: GET
scripts:
  - type: afterResponse
    code: "// Valida se a resposta está em formato JSON\r

      pm.test(\"Resposta deve estar em formato JSON\", function () {\r

      \    pm.response.to.be.json;\r

      });\r

      \r

      // Converte a resposta para objeto JavaScript\r

      const jsonData = pm.response.json();\r

      \r

      // Valida os campos principais do contrato\r

      pm.test(\"Resposta possui firstname\", function () {\r

      \    pm.expect(jsonData).to.have.property(\"firstname\");\r

      });\r

      \r

      pm.test(\"Resposta possui lastname\", function () {\r

      \    pm.expect(jsonData).to.have.property(\"lastname\");\r

      });\r

      \r

      pm.test(\"Resposta possui totalprice\", function () {\r

      \    pm.expect(jsonData).to.have.property(\"totalprice\");\r

      });\r

      \r

      pm.test(\"Resposta possui depositpaid\", function () {\r

      \    pm.expect(jsonData).to.have.property(\"depositpaid\");\r

      });\r

      \r

      pm.test(\"Resposta possui bookingdates\", function () {\r

      \    pm.expect(jsonData).to.have.property(\"bookingdates\");\r

      });\r

      \r

      pm.test(\"Bookingdates possui checkin\", function () {\r

      \    pm.expect(jsonData.bookingdates).to.have.property(\"checkin\");\r

      });\r

      \r

      pm.test(\"Bookingdates possui checkout\", function () {\r

      \    pm.expect(jsonData.bookingdates).to.have.property(\"checkout\");\r

      });\r

      \r

      pm.test(\"Resposta possui additionalneeds\", function () {\r

      \    pm.expect(jsonData).to.have.property(\"additionalneeds\");\r

      });\r

      \r

      // Exibe o contrato validado no console\r

      console.log(\"Contrato JSON da consulta validado:\", jsonData);"
    language: text/javascript
order: 573437099905106

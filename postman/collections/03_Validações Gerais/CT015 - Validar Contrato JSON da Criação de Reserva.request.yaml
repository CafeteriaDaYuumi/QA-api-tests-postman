$kind: http-request
name: CT015 - Validar Contrato JSON da Criação de Reserva
description: |-
  ### CT015 - Validar Contrato JSON da Criação de Reserva

  **Objetivo:**  
  Validar se a resposta da criação de reserva segue o contrato JSON esperado pela API.

  **Pré-condições:**

  - Executar CT004 - Criar Reserva com Dados Válidos.
      
  - Verificar se a criação da reserva foi concluída com sucesso.
      
  - Garantir que a resposta da API contenha os dados da reserva criada.
      

  **Método:**  
  POST

  **Endpoint:**  
  /booking

  **Resultado Esperado:**

  - A resposta deve estar em formato JSON.
      
  - A resposta deve conter o campo bookingid.
      
  - A resposta deve conter o objeto booking.
      
  - O objeto booking deve conter os campos firstname, lastname, totalprice, depositpaid, bookingdates e additionalneeds.
      
  - O objeto bookingdates deve conter os campos checkin e checkout.
      

  **Critério de Aprovação:**

  O contrato JSON da resposta deve conter todos os campos obrigatórios esperados para a criação de uma reserva.
url: "{{baseURL}}/booking"
method: POST
body:
  type: json
  content: "{\r

    \  \"firstname\": \"Victor\",\r

    \  \"lastname\": \"Hugo\",\r

    \  \"totalprice\": 350,\r

    \  \"depositpaid\": true,\r

    \  \"bookingdates\": {\r

    \    \"checkin\": \"2026-07-01\",\r

    \    \"checkout\": \"2026-07-05\"\r

    \  },\r

    \  \"additionalneeds\": \"Breakfast\"\r

    }"
scripts:
  - type: afterResponse
    code: "// Valida se a resposta está em formato JSON\r

      pm.test(\"Resposta deve estar em formato JSON\", function () {\r

      \    pm.response.to.be.json;\r

      });\r

      \r

      // Converte a resposta para objeto JavaScript\r

      const jsonData = pm.response.json();\r

      \r

      // Valida a estrutura principal da resposta\r

      pm.test(\"Resposta possui bookingid\", function () {\r

      \    pm.expect(jsonData).to.have.property(\"bookingid\");\r

      });\r

      \r

      pm.test(\"Resposta possui objeto booking\", function () {\r

      \    pm.expect(jsonData).to.have.property(\"booking\");\r

      });\r

      \r

      // Valida os campos obrigatórios do objeto booking\r

      pm.test(\"Booking possui firstname\", function () {\r

      \    pm.expect(jsonData.booking).to.have.property(\"firstname\");\r

      });\r

      \r

      pm.test(\"Booking possui lastname\", function () {\r

      \    pm.expect(jsonData.booking).to.have.property(\"lastname\");\r

      });\r

      \r

      pm.test(\"Booking possui totalprice\", function () {\r

      \    pm.expect(jsonData.booking).to.have.property(\"totalprice\");\r

      });\r

      \r

      pm.test(\"Booking possui depositpaid\", function () {\r

      \    pm.expect(jsonData.booking).to.have.property(\"depositpaid\");\r

      });\r

      \r

      pm.test(\"Booking possui bookingdates\", function () {\r

      \    pm.expect(jsonData.booking).to.have.property(\"bookingdates\");\r

      });\r

      \r

      pm.test(\"Bookingdates possui checkin e checkout\", function () {\r

      \    pm.expect(jsonData.booking.bookingdates).to.have.property(\"checkin\");\r

      \    pm.expect(jsonData.booking.bookingdates).to.have.property(\"checkout\");\r

      });\r

      \r

      pm.test(\"Booking possui additionalneeds\", function () {\r

      \    pm.expect(jsonData.booking).to.have.property(\"additionalneeds\");\r

      });\r

      \r

      // Exibe o contrato validado no console\r

      console.log(\"Contrato JSON da criação validado:\", jsonData);"
    language: text/javascript
order: 1781980645788
